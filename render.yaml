services:
  - type: web
    name: shopwave-autonomous-support-resolution-agent
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python ui_app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GRADIO_SERVER_NAME
        value: 0.0.0.0
      - key: GRADIO_ROOT_PATH
        value: /
      - key: ORCHESTRATION_MODE
        value: autogen
      - key: ENABLE_AUTOGEN
        value: true
      - key: AUTOGEN_ROLES
        value: planner
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODELS
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: PERSIST_TOOL_MUTATIONS
        value: false
      - key: AUTOGEN_TEMPERATURE
        value: 0.0
      - key: AUTOGEN_MAX_TOKENS
        value: 260
      - key: AUTOGEN_PAYLOAD_CHAR_LIMIT
        value: 2800
      - key: GROQ_API_KEY
        sync: false
